# AgentSpec CI — runs on every push and pull request
# All 48+ contract tests must pass before merge
#
# What this validates:
#   - All structural contract assertions are deterministic (no flakiness)
#   - No API calls in tests (mock mode only)
#   - Security: no secrets in staged files
#
# For live integration tests (real Claude API), use the separate
# integration-tests.yml workflow with secrets.ANTHROPIC_API_KEY.

name: AgentSpec Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Security check — no secrets in code
        run: |
          # Fail if any hardcoded API keys or secrets are found
          if grep -rE "(api_key|secret|password|token)\s*=\s*['\"][a-zA-Z0-9_\-]{20,}" \
              --include="*.py" --exclude-dir=".git" .; then
            echo "ERROR: Hardcoded secret detected. Aborting."
            exit 1
          fi
          echo "Security check passed."

      - name: Verify .env is not committed
        run: |
          if git ls-files | grep -E "^\.env$"; then
            echo "ERROR: .env file is tracked by git. Remove it immediately."
            exit 1
          fi
          echo ".env check passed."

      - name: Run tests (mock mode — no API key required)
        env:
          AGENTSPEC_MODE: mock
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run demo (smoke test)
        env:
          AGENTSPEC_MODE: mock
        run: |
          python demo/demo.py

      - name: Check test count (regression guard)
        run: |
          COUNT=$(python -m pytest tests/ --collect-only -q 2>&1 | grep "selected" | grep -oE "[0-9]+")
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 48 ]; then
            echo "ERROR: Expected at least 48 tests, found $COUNT. Tests may have been accidentally deleted."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install pyflakes
      - name: Run pyflakes (syntax check)
        run: |
          python -m pyflakes agentspec/ tests/ demo/
          echo "Syntax check passed."
